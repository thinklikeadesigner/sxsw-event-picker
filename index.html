<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXSW 2026 Event Picker v2</title>
  <link rel="manifest" href="/sxsw-event-picker/manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="sticky-top">
    <header>
      <div>
        <h1>SXSW 2026 Event Picker</h1>
        <div class="subtitle">Browse, star, resolve conflicts, export</div>
      </div>
      <div class="header-stats">
        <div class="stat">Starred: <span id="starred-count">0</span></div>
        <div class="stat">Conflicts: <span id="conflict-count">0</span></div>
        <div class="social-links">
          <a href="https://www.linkedin.com/in/rebecca-burch/" target="_blank" class="social-link" aria-label="LinkedIn">in</a>
          <a href="https://x.com/thinkLikeADev" target="_blank" class="social-link" aria-label="X / Twitter">X</a>
        </div>
      </div>
    </header>
    <nav class="view-tabs">
      <button class="tab active" data-view="discover">Discover</button>
      <button class="tab" data-view="map">Map</button>
      <button class="tab" data-view="resolve">Resolve <span class="tab-badge" id="resolve-badge" style="display:none">0</span></button>
      <button class="tab" data-view="schedule">Schedule</button>
    </nav>
    <div class="controls" id="controls">
      <button class="filter-toggle" id="filter-toggle">Filters ▾</button>
      <div class="filter-rows" id="filter-rows">
        <div class="filter-row" id="day-filters"></div>
        <div class="filter-row" id="cost-filters"></div>
      </div>
    </div>
  </div>
  <main id="content"></main>
  <footer class="site-footer">
    <div class="footer-bmc"></div>
    Built by Rebecca Burch · <a href="https://www.linkedin.com/in/rebecca-burch/" target="_blank">LinkedIn</a> · <a href="https://x.com/thinkLikeADev" target="_blank">X</a>
  </footer>
  <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="thinklikeadesigner" data-color="#FFDD00" data-emoji="" data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
