<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXSW 2026 Event Picker v2</title>
  <link rel="manifest" href="/sxsw-event-picker/manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GLWBLXG25"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9GLWBLXG25');
  </script>
</head>
<body>
  <div class="sticky-top">
    <header>
      <div>
        <h1>SXSW 2026 Event Picker</h1>
        <div class="subtitle">Browse, star, resolve conflicts, export</div>
      </div>
      <div class="header-stats">
        <div class="stat">Starred: <span id="starred-count">0</span></div>
        <div class="stat">Conflicts: <span id="conflict-count">0</span></div>
        <div class="social-links">
          <a href="https://www.linkedin.com/in/rebecca-burch/" target="_blank" class="social-link" aria-label="LinkedIn">in</a>
          <a href="https://x.com/thinkLikeADev" target="_blank" class="social-link" aria-label="X / Twitter">X</a>
        </div>
      </div>
    </header>
    <nav class="view-tabs">
      <button class="tab active" data-view="discover">Discover</button>
      <button class="tab" data-view="map">Map</button>
      <button class="tab" data-view="resolve">Resolve <span class="tab-badge" id="resolve-badge" style="display:none">0</span></button>
      <button class="tab" data-view="schedule">Schedule</button>
    </nav>
    <div class="controls" id="controls">
      <button class="filter-toggle" id="filter-toggle">Filters ▾</button>
      <div class="filter-rows" id="filter-rows">
        <div class="filter-row" id="day-filters"></div>
        <div class="filter-row" id="cost-filters"></div>
      </div>
    </div>
  </div>
  <main id="content"></main>
  <footer class="site-footer">
    Built by Rebecca Burch · <a href="https://www.linkedin.com/in/rebecca-burch/" target="_blank">LinkedIn</a> · <a href="https://x.com/thinkLikeADev" target="_blank">X</a> · <a href="https://buymeacoffee.com/thinklikeadesigner" target="_blank" class="bmc-link">Buy me a coffee</a>
  </footer>
  <div class="visitor-badge"><img src="https://api.visitorbadge.io/api/visitors?path=sxsw-event-picker&label=Views&countColor=%234ade80&labelColor=%232a2a2a" alt="Visitor count"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
